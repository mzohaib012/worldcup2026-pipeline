name: World Cup 2026 Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    name: Run dbt Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: worldcup2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install dbt-postgres pandas psycopg2-binary sqlalchemy python-dotenv

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          worldcup_dbt:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                port: 5432
                user: postgres
                pass: admin123
                dbname: worldcup2026
                schema: public
                threads: 2
          EOF

      - name: Run schema SQL
        run: |
          PGPASSWORD=admin123 psql -h localhost -U postgres -d worldcup2026 -f sql/schema.sql

      - name: Run dbt compile (validates all SQL)
        working-directory: worldcup_dbt
        run: dbt compile

      - name: Run dbt test
        working-directory: worldcup_dbt
        run: dbt test
        continue-on-error: true

  frontend-build:
    name: React Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build