services:
  airflow-metadata-db:
    image: postgres:15
    container_name: airflow_metadata_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - worldcup_net

  airflow-init:
    image: apache/airflow:2.9.0-python3.11
    container_name: airflow_init
    depends_on:
      - airflow-metadata-db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata-db/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: requests kafka-python psycopg2-binary python-dotenv
      AIRFLOW__WEBSERVER__SECRET_KEY: "worldcup2026_secret_key_change_later"
    entrypoint: /bin/bash
    command:
      - "-c"
      - "airflow db init && airflow users create --username admin --password admin --firstname Zohaib --lastname Admin --role Admin --email admin@example.com"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    networks:
      - worldcup_net

  airflow-webserver:
    image: apache/airflow:2.9.0-python3.11
    container_name: airflow_webserver
    depends_on:
      - airflow-init
    environment:
      HOST_POSTGRES_HOST: host.docker.internal
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata-db/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: requests kafka-python psycopg2-binary python-dotenv
      AIRFLOW__WEBSERVER__SECRET_KEY: "worldcup2026_secret_key_change_later"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: "5432"
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: webserver
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    networks:
      - worldcup_net

  airflow-scheduler:
    image: apache/airflow:2.9.0-python3.11
    container_name: airflow_scheduler
    depends_on:
      - airflow-init
    environment:
      HOST_POSTGRES_HOST: host.docker.internal
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata-db/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: requests kafka-python psycopg2-binary python-dotenv
      AIRFLOW__WEBSERVER__SECRET_KEY: "worldcup2026_secret_key_change_later"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: "5432"
    env_file:
      - .env
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    networks:
      - worldcup_net

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    networks:
      - worldcup_net

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb
    environment:
      POSTGRES_USER: tsuser
      POSTGRES_PASSWORD: tspass
      POSTGRES_DB: matchevents
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - worldcup_net

volumes:
  airflow_db_data:
  timescale_data:

networks:
  worldcup_net:
    driver: bridge